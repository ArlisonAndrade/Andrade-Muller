<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal da Família</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-dark:#17110b;
    --wood-mid:#241a10;
    --wood-warm:#33230f;
    --gold:#c9a24b;
    --gold-soft:#e3c476;
    --gold-dim:rgba(201,162,75,0.35);
    --ink:#efe6d3;
    --card-bg:#2a1e13;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}

  body{
    background:
      radial-gradient(ellipse 900px 700px at 50% 30%, var(--wood-warm) 0%, var(--wood-mid) 45%, var(--wood-dark) 100%);
    font-family:'Cormorant Garamond', serif;
    color:var(--ink);
    overflow:hidden;
  }

  .grain{
    position:fixed; inset:0;
    pointer-events:none;
    opacity:0.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .app-shell{
    position:relative;
    width:100vw;
    height:100vh;
  }

  /* ---------- shared crest element (animates between the two views) ---------- */
  .crest-el{
    position:absolute;
    left:50%;
    top:19vh;
    width:clamp(120px,15vw,210px);
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center;
    transition:left 1.05s cubic-bezier(.22,.9,.28,1),
               top 1.05s cubic-bezier(.22,.9,.28,1),
               width 1.05s cubic-bezier(.22,.9,.28,1);
    z-index:5;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,0.55));
  }

  .glow{
    position:absolute;
    left:50%; top:19vh;
    width:clamp(200px,22vw,320px);
    height:clamp(200px,22vw,320px);
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(227,196,118,0.28) 0%, rgba(227,196,118,0.06) 45%, transparent 70%);
    filter:blur(14px);
    opacity:0;
    animation:glowIn 2.2s ease-out .1s forwards;
    transition:left 1.05s cubic-bezier(.22,.9,.28,1), top 1.05s cubic-bezier(.22,.9,.28,1),
               width 1.05s ease, height 1.05s ease, opacity .6s ease;
    z-index:4;
    pointer-events:none;
  }
  @keyframes glowIn{ 0%{opacity:0;} 100%{opacity:1;} }

  .crest-img{
    display:block;
    width:100%;
    height:auto;
    opacity:0;
    filter:blur(10px);
    transform:scale(1.05);
    animation:crestIn 1.8s ease-out .25s forwards;
  }
  @keyframes crestIn{
    0%{opacity:0; filter:blur(10px); transform:scale(1.05);}
    100%{opacity:1; filter:blur(0); transform:scale(1);}
  }

  /* hub state: crest shrinks into a corner house-mark */
  .app-shell[data-view="hub"] .crest-el{
    left:60px; top:40px; width:clamp(52px,6vw,72px);
  }
  .app-shell[data-view="hub"] .glow{
    left:60px; top:40px; width:150px; height:150px; opacity:.6;
  }

  /* ---------- views ---------- */
  .view{
    position:absolute; inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:opacity .5s ease, transform .5s ease;
  }

  /* --- portal (login) view --- */
  .view-portal{
    justify-content:flex-end;
    padding-bottom:9vh;
    opacity:1;
    z-index:3;
  }
  .app-shell[data-view="hub"] .view-portal{
    opacity:0;
    transform:translateY(-14px);
    pointer-events:none;
  }

  .eyebrow{
    margin:0 0 34px;
    font-family:'Cinzel',serif;
    font-size:12px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--gold-soft);
    opacity:0;
    animation:fadeUp 1s ease .9s forwards;
  }
  @keyframes fadeUp{
    0%{opacity:0; transform:translateY(8px);}
    100%{opacity:.85; transform:translateY(0);}
  }

  .google-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:12px;
    padding:14px 28px;
    background:var(--wood-mid);
    border:1px solid var(--gold-dim);
    border-radius:3px;
    color:var(--ink);
    font-family:'Cinzel',serif;
    font-size:13px;
    letter-spacing:.14em;
    text-transform:uppercase;
    cursor:pointer;
    opacity:0;
    animation:fadeUp 1s ease 1.25s forwards;
    transition:border-color .3s ease, background .3s ease, transform .2s ease;
  }
  .google-btn:hover{
    border-color:var(--gold);
    background:var(--wood-warm);
    transform:translateY(-1px);
  }
  .google-btn:active{ transform:translateY(0); }
  .google-btn svg{ width:18px; height:18px; flex:none; }
  .google-btn .label{ white-space:nowrap; }
  .google-btn .spinner{
    display:none;
    width:14px; height:14px;
    border:2px solid rgba(239,230,211,0.25);
    border-top-color:var(--gold-soft);
    border-radius:50%;
  }
  .google-btn.loading svg{ display:none; }
  .google-btn.loading .spinner{ display:inline-block; animation:spin .8s linear infinite; }
  .google-btn.loading .label::after{ content:"Conectando…"; }
  .google-btn.loading .label{ font-size:0; }
  .google-btn.loading .label::after{ font-size:13px; }
  @keyframes spin{ to{ transform:rotate(360deg);} }

  .fineprint{
    margin-top:16px;
    font-size:12px;
    color:rgba(239,230,211,0.35);
    opacity:0;
    animation:fadeUp 1s ease 1.4s forwards;
  }

  /* --- hub view --- */
  .view-hub{
    justify-content:flex-start;
    padding-top:0;
    opacity:0;
    transform:translateY(14px);
    pointer-events:none;
    z-index:3;
  }
  .app-shell[data-view="hub"] .view-hub{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
    transition:opacity .6s ease .35s, transform .6s ease .35s;
  }

  .hub-topbar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:18px;
    padding:22px 32px;
  }
  .account-chip{
    display:flex; align-items:center; gap:8px;
    font-size:14px;
    color:rgba(239,230,211,0.65);
  }
  .account-chip .dot{
    width:8px; height:8px; border-radius:50%;
    background:#7bbf7b;
    box-shadow:0 0 6px #7bbf7b;
  }
  .signout{
    background:none; border:none;
    font-family:'Cormorant Garamond', serif;
    font-size:14px;
    color:rgba(239,230,211,0.55);
    text-decoration:underline;
    text-underline-offset:3px;
    cursor:pointer;
  }
  .signout:hover{ color:var(--gold-soft); }

  .hub-title{
    margin:6vh 0 4px;
    font-family:'Cinzel',serif;
    font-size:15px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold-soft);
  }
  .hub-sub{
    margin:0 0 6vh;
    font-size:14px;
    color:rgba(239,230,211,0.4);
  }

  .hub-cards{
    display:flex;
    gap:48px;
    flex-wrap:wrap;
    justify-content:center;
    padding:0 24px;
  }
  .env-card{
    --delay:0s;
    width:220px;
    padding:34px 20px 26px;
    background:linear-gradient(180deg, var(--card-bg), var(--wood-mid));
    border:1px solid var(--gold-dim);
    border-radius:4px;
    text-decoration:none;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    cursor:pointer;
    opacity:0;
    transform:translateY(10px);
    transition:transform .35s ease, border-color .35s ease, box-shadow .35s ease,
               opacity .6s ease var(--delay), transform .6s ease var(--delay);
  }
  .app-shell[data-view="hub"] .env-card{
    opacity:1;
    transform:translateY(0);
  }
  .env-card:hover{
    border-color:var(--gold);
    box-shadow:0 16px 34px rgba(0,0,0,0.45);
    transform:translateY(-4px);
  }
  .env-shield{
    width:64px; height:74px;
    display:flex; align-items:center; justify-content:center;
    background:var(--wood-warm);
    border:1px solid var(--gold-dim);
    clip-path:polygon(0 0,100% 0,100% 65%,50% 100%,0 65%);
    font-family:'Cinzel',serif;
    font-size:20px;
    color:var(--gold-soft);
  }
  .env-label{
    font-family:'Cinzel',serif;
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    text-align:center;
  }
  .env-note{
    font-size:12px;
    color:rgba(239,230,211,0.35);
    text-align:center;
  }

  @media (max-width:640px){
    .crest-el{ width:clamp(110px,32vw,160px); top:15vh; }
    .app-shell[data-view="hub"] .crest-el{ left:50%; top:52px; width:56px; transform:translate(-50%,0) scale(1); }
    .app-shell[data-view="hub"] .glow{ left:50%; top:52px; width:130px; height:130px; transform:translate(-50%,0);}
    .view-hub{ padding-top:10px; }
    .hub-topbar{ justify-content:space-between; padding:16px 20px; }
    .hub-title{ margin-top:120px; font-size:13px; }
    .hub-cards{ gap:22px; }
  }

  @media (prefers-reduced-motion: reduce){
    .crest-img,.eyebrow,.motto,.google-btn,.fineprint,.env-card{ animation-duration:.01ms !important; }
    .crest-el,.glow,.view,.env-card{ transition-duration:.01ms !important; }
  }
</style>
</head>

  <!-- ===== view 1 — portal / login ===== -->
  <section class="view view-portal">
    <p class="eyebrow">Acesso restrito · área da família</p>
    <button class="google-btn" id="googleBtn" type="button">
      <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.581C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z"/>
      </svg>
      <span class="spinner"></span>
      <span class="label">Entrar com Google</span>
    </button>
    <p class="fineprint">protótipo — autenticação real a conectar via Supabase Auth</p>
  </section>

  <!-- ===== view 2 — hub / seleção de ambiente ===== -->
  <section class="view view-hub">
    <div class="hub-topbar">
      <span class="account-chip"><span class="dot"></span> Conta Google conectada</span>
      <button class="signout" id="signoutBtn" type="button">Sair</button>
    </div>
    <p class="hub-title">Escolha um ambiente</p>
    <p class="hub-sub">placeholders — envie os 2 logos e nomes definitivos</p>
    <div class="hub-cards">
      <a class="env-card" style="--delay:.05s" data-slot="1" href="#">
        <div class="env-shield">I</div>
        <span class="env-label">Ambiente 1</span>
        <span class="env-note">aguardando logo/URL</span>
      </a>
      <a class="env-card" style="--delay:.18s" data-slot="2" href="#">
        <div class="env-shield">II</div>
        <span class="env-label">Ambiente 2</span>
        <span class="env-note">aguardando logo/URL</span>
      </a>
    </div>
  </section>

</div>

<script>
  const shell = document.getElementById('shell');
  const googleBtn = document.getElementById('googleBtn');
  const signoutBtn = document.getElementById('signoutBtn');

  googleBtn.addEventListener('click', () => {
    if (googleBtn.classList.contains('loading')) return;
    googleBtn.classList.add('loading');
    // simulated OAuth handshake delay — swap for supabase.auth.signInWithOAuth({provider:'google'}) in production
    setTimeout(() => {
      shell.dataset.view = 'hub';
      googleBtn.classList.remove('loading');
    }, 650);
  });

  signoutBtn.addEventListener('click', () => {
    shell.dataset.view = 'portal';
  });

  // env cards currently placeholders — wire real hrefs once destinations are defined
  document.querySelectorAll('.env-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (card.getAttribute('href') === '#') e.preventDefault();
    });
  });
</script>
